  - name: Configuration
    description: Configuration management
  - name: State
    description: State file operations
  - name: Volume
    description: Main volume and mute control (fader 0)
  - name: Faders
    description: Individual fader control
  - name: Signal
    description: Signal level monitoring
  - name: Processing
    description: Processing status and parameters
  - name: Devices
    description: Audio device discovery
