name: Build Release Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Add arm64 architecture and install cross-compilation dependencies
        run: |
          sudo dpkg --add-architecture arm64

          # Restrict existing deb822 sources (.sources) to amd64 only
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && sudo sed -i '/^Architectures:/d; /^Types:/a Architectures: amd64' "$f"
          done

          # Restrict existing .list sources to amd64 (skip non-ubuntu lists)
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's/^deb http/deb [arch=amd64] http/' /etc/apt/sources.list
          fi
          for f in /etc/apt/sources.list.d/ubuntu*.list; do
            [ -f "$f" ] && sudo sed -i 's/^deb http/deb [arch=amd64] http/' "$f"
          done

          # Add arm64 sources from ports
          cat <<SOURCES | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble-updates main restricted universe multiverse
          SOURCES

          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config \
            build-essential \
            libdbus-1-dev:arm64 \
            libasound2-dev:arm64 \
            libssl-dev:arm64

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
          components: rustfmt, clippy

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "camilladsp-aarch64-build"
          cache-targets: true
          cache-all-crates: true
          workspaces: ". -> target"
          cache-on-failure: true

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: 1
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp target/aarch64-unknown-linux-gnu/release/camilladsp release/
          cd release && tar czf camilladsp-aarch64-linux-gnu.tar.gz camilladsp

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: camilladsp-aarch64-linux-gnu
          path: release/camilladsp-aarch64-linux-gnu.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/camilladsp-aarch64-linux-gnu.tar.gz
          generate_release_notes: true
